<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>WebDoom</title>
  <link rel="icon" href="data:,">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    #webdoom { display:block; width:100vw; height:100vh; }
    #overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.8);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; color:#f00;
      font-family:monospace; font-size:2rem;
      z-index:10; overflow-y:auto;
    }
    #overlay h1 { margin-bottom:1.5rem; font-size:3rem; text-shadow:0 0 20px #f00; }
    .btn-grid { display:flex; flex-wrap:wrap; justify-content:center; max-width:700px; }
    .btn {
      margin:.4rem; padding:.7rem 1.4rem;
      background:#300; color:#f00; border:2px solid #f00;
      font-family:monospace; font-size:1.2rem; cursor:pointer;
    }
    .btn:hover { background:#600; }
    #hud {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:8px; height:8px;
      border:2px solid rgba(255,255,255,0.8);
      border-radius:50%; pointer-events:none; z-index:5;
    }
    #btn-menu {
      position:fixed; top:12px; left:12px;
      padding:.4rem .8rem;
      background:#300; color:#f00; border:2px solid #f00;
      font-family:monospace; font-size:0.9rem; cursor:pointer;
      z-index:6; display:none;
    }
    #btn-menu:hover { background:#600; }
    #minimap {
      position:fixed; top:10px; right:10px;
      width:200px; height:200px;
      border:1px solid #f00; background:#000; opacity:0.8;
      z-index:5; display:none;
    }
    #hud-compass {
      position:fixed; top:10px; left:50%; transform:translateX(-50%);
      color:#ff0; font-family:monospace; font-size:1rem;
      background:rgba(0,0,0,0.5); padding:2px 8px;
      z-index:5; display:none; pointer-events:none;
    }
    #hud-slash {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%, -50%);
      color:#fff; font-size:2.5rem;
      pointer-events:none; z-index:6;
      display:none; opacity:1;
      text-shadow: 0 0 10px #f88, 0 0 20px #f44;
    }
  </style>
</head>
<body>
  <canvas id="webdoom"></canvas>
  <canvas id="minimap" width="200" height="200"></canvas>
  <div id="hud-compass">N</div>
  <div id="hud-slash">⚔</div>
  <div id="hud"></div>
  <button id="btn-menu" class="btn">MENU</button>
  <div id="overlay">
    <h1>&#9760; WEBDOOM &#9760;</h1>
    <div class="btn-grid">
      <button class="btn" id="btn-level1">Level 1</button>
      <button class="btn" id="btn-level2">Level 2</button>
      <button class="btn" id="btn-level3">Level 3</button>
      <button class="btn" id="btn-level4">Level 4</button>
      <button class="btn" id="btn-level5">Level 5</button>
      <button class="btn" id="btn-level6">Level 6</button>
      <button class="btn" id="btn-level7">Level 7</button>
      <button class="btn" id="btn-level8">Level 8</button>
      <button class="btn" id="btn-level9">Level 9</button>
      <button class="btn" id="btn-level10">Level 10</button>
    </div>
    <p style="font-size:0.8rem;margin-top:1rem;color:#888">Click canvas to capture mouse · WASD / arrows to move · Space/Click to slash · TAB for minimap</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
